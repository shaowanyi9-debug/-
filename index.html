<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>财富人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(246,211,101,.15)}50%{box-shadow:0 0 40px rgba(246,211,101,.35)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
/* Cover */
.cover-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;background:linear-gradient(180deg,#0a0a0f 0%,#1a1020 40%,#0a0a0f 100%)}
.cover-icon{font-size:64px;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
.cover-title{font-size:36px;font-weight:900;background:linear-gradient(135deg,#f6d365,#fda085,#f6d365);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;margin-bottom:12px}
.cover-sub{font-size:16px;color:#aaa;margin-bottom:40px;line-height:1.6}
.cover-tags{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:50px}
.cover-tag{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:#ccc}
.btn-start{padding:14px 48px;font-size:18px;font-weight:700;border:none;border-radius:30px;background:linear-gradient(135deg,#f6d365,#fda085);color:#1a1a2e;cursor:pointer;animation:slideUp .8s ease;transition:all .3s}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(246,211,101,.3)}
/* Choice */
.choice-page{display:none;min-height:100vh;padding:40px 20px;flex-direction:column;align-items:center;justify-content:center}
.choice-page.active{display:flex}
.choice-title{font-size:28px;font-weight:800;color:#f6d365;margin-bottom:8px;text-align:center}
.choice-sub{font-size:15px;color:#999;margin-bottom:40px;text-align:center}
.choice-cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;max-width:700px;width:100%}
.choice-card{flex:1;min-width:260px;max-width:320px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:30px 24px;text-align:center;cursor:pointer;transition:all .3s}
.choice-card:hover{transform:translateY(-4px);border-color:rgba(246,211,101,.4);box-shadow:0 12px 40px rgba(246,211,101,.1)}
.choice-card.light:hover{border-color:rgba(129,199,132,.4);box-shadow:0 12px 40px rgba(129,199,132,.1)}
.choice-card .card-icon{font-size:40px;margin-bottom:12px}
.choice-card .card-name{font-size:20px;font-weight:800;margin-bottom:8px;color:#f6d365}
.choice-card.light .card-name{color:#81c784}
.choice-card .card-info{font-size:14px;color:#aaa;line-height:1.6;margin-bottom:8px}
.choice-card .card-tag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;background:rgba(246,211,101,.1);color:#f6d365}
.choice-card.light .card-tag{background:rgba(129,199,132,.1);color:#81c784}
/* Question */
.q-page{display:none;min-height:100vh;padding:24px 16px 80px}
.q-page.active{display:block}
.q-header{padding:12px 0;margin-bottom:16px}
.q-progress{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.q-progress-fill{height:100%;background:linear-gradient(90deg,#f6d365,#fda085);border-radius:2px;transition:width .3s}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.q-num{font-size:14px;color:#f6d365;font-weight:700}
.q-count{font-size:12px;color:#888}
.q-text{font-size:20px;font-weight:700;line-height:1.6;margin-bottom:24px;color:#f0f0f0;animation:fadeIn .4s}
.opt-list{display:flex;flex-direction:column;gap:10px;max-width:600px;margin:0 auto}
.opt-item{padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px;animation:fadeIn .5s}
.opt-item:hover{border-color:rgba(246,211,101,.3);background:rgba(246,211,101,.05)}
.opt-item.selected{border-color:#f6d365;background:rgba(246,211,101,.1)}
.opt-label{font-size:14px;font-weight:800;color:#f6d365;min-width:20px;line-height:1.5}
.opt-text{font-size:15px;color:#ccc;line-height:1.5}
.q-nav{display:flex;justify-content:space-between;margin-top:30px;max-width:600px;margin-left:auto;margin-right:auto;gap:12px}
.btn-nav{padding:12px 28px;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-prev{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15)}
.btn-prev:hover{background:rgba(255,255,255,.12)}
.btn-next{background:linear-gradient(135deg,#f6d365,#fda085);color:#1a1a2e}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(246,211,101,.25)}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
/* Result */
.result-page{display:none;min-height:100vh;padding:30px 16px 60px;max-width:680px;margin:0 auto}
.result-page.active{display:block}
.animate-in{animation:slideUp .6s ease}
/* Panel 1: 结果类型 */
.result-header{text-align:center;margin-bottom:28px}
.result-label{text-align:center;font-size:13px;color:#888;margin-bottom:6px;letter-spacing:4px;text-transform:uppercase}
.result-type-name{text-align:center;font-size:40px;font-weight:900;margin-bottom:6px}
.result-type-tagline{text-align:center;font-size:15px;color:#999;line-height:1.5}
.result-score-ring{width:110px;height:110px;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;animation:pulse 2s ease-in-out infinite}
.score-num{font-size:36px;font-weight:900;line-height:1}
.score-pct{font-size:12px;color:#888;margin-top:2px}
/* Result panels */
.result-panel{margin-bottom:20px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:20px;animation:fadeIn .5s}
.result-panel.highlight{border-color:rgba(246,211,101,.2);box-shadow:0 0 30px rgba(246,211,101,.06)}
.panel-number{display:inline-block;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-size:12px;font-weight:800;margin-right:8px;background:rgba(246,211,101,.15);color:#f6d365}
.panel-title{font-size:17px;font-weight:700;color:#f6d365;margin-bottom:12px;display:flex;align-items:center}
.panel-content{font-size:14px;color:#ccc;line-height:1.8}
.panel-list{list-style:none;padding:0}
.panel-list li{padding:6px 0 6px 18px;position:relative;line-height:1.7}
.panel-list li::before{content:'';position:absolute;left:0;top:12px;width:6px;height:6px;border-radius:50%}
.panel-list.good li::before{background:#81c784}
.panel-list.bad li::before{background:#ff6b6b}
.panel-list.advice li::before{background:#f6d365}
/* Wealth dims */
.dims-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.dim-item{background:rgba(255,255,255,.03);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.dim-label{font-size:12px;color:#999}
.dim-bar{flex:1;height:5px;border-radius:3px;margin:0 10px;overflow:hidden;background:rgba(255,255,255,.06)}
.dim-fill{height:100%;border-radius:3px;transition:width 1s ease}
.dim-pct{font-size:12px;font-weight:700;min-width:32px;text-align:right}
/* Golden quote box */
.quote-box{text-align:center;padding:24px 20px;background:linear-gradient(135deg,rgba(246,211,101,.08),rgba(253,160,133,.08));border:1px solid rgba(246,211,101,.2);border-radius:14px;margin-bottom:20px}
.quote-icon{font-size:28px;margin-bottom:8px}
.quote-text{font-size:16px;font-weight:700;line-height:1.8;color:#f0f0f0}
.btn-retry{display:block;margin:30px auto 0;padding:12px 36px;border-radius:24px;font-size:15px;font-weight:600;background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15);cursor:pointer;transition:all .2s}
.btn-retry:hover{background:rgba(255,255,255,.12)}
</style>
</head>
<body>

<div class="cover-page" id="coverPage">
  <div class="cover-icon">💰</div>
  <div class="cover-title">财富人格测试</div>
  <div class="cover-sub">6种财富人格，你属于哪一种？</div>
  <div class="cover-tags">
    <span class="cover-tag">超级个体者</span>
    <span class="cover-tag">大厂的牛马</span>
    <span class="cover-tag">成长打工人</span>
    <span class="cover-tag">天选老板命</span>
    <span class="cover-tag">技术型选手</span>
    <span class="cover-tag">机会猎手</span>
  </div>
  <button class="btn-start" onclick="showChoice()">开始测试</button>
</div>

<div class="choice-page" id="choicePage">
  <div class="choice-title">选择你的测试版本</div>
  <div class="choice-sub">轻量快速 or 深度完整，由你决定</div>
  <div class="choice-cards">
    <div class="choice-card light" onclick="startTest('light')">
      <div class="card-icon">⚡</div>
      <div class="card-name">轻交付版</div>
      <div class="card-info">只需回答 5 道精选核心题<br>快速了解你的财富人格</div>
      <span class="card-tag">约 1 分钟</span>
    </div>
    <div class="choice-card" onclick="startTest('full')">
      <div class="card-icon">🔍</div>
      <div class="card-name">结果交付版</div>
      <div class="card-info">完整回答 20 道深度测试题<br>精准描绘你的财富画像</div>
      <span class="card-tag">约 4 分钟</span>
    </div>
  </div>
</div>

<div class="q-page" id="qPage">
  <div class="q-header">
    <div class="q-meta"><span class="q-num" id="qNum"></span><span class="q-count" id="qMode"></span></div>
    <div class="q-progress"><div class="q-progress-fill" id="progressFill"></div></div>
  </div>
  <div class="q-text" id="qText"></div>
  <div class="opt-list" id="optList"></div>
  <div class="q-nav">
    <button class="btn-nav btn-prev" id="btnPrev" onclick="prevQ()" style="visibility:hidden">上一题</button>
    <button class="btn-nav btn-next" id="btnNext" onclick="nextQ()">下一题</button>
  </div>
</div>

<div class="result-page" id="resultPage">
  <div class="animate-in" id="resultContent"></div>
  <button class="btn-retry" onclick="goHome()">重新测试</button>
</div>

<script>
const L = 'ABCDEF'.split('');

/* ===== 6种财富人格完整定义 ===== */
const TYPES = [
{
  id:1, name:'超级个体者', color:'#ff6b6b',
  tagline:'不靠平台，自己就是品牌',
  personality:'独立思考，极少随大流。对"打工"有天然的排斥感，相信自己的能力比任何公司都值钱。有强烈的表达欲和个人见解，不愿意被体制束缚。做事节奏自成一派，你给他规则，他先问你为什么。边界感极强，喜欢单枪匹马解决问题，认为依赖别人就是给自己留隐患。内心深处有一种"我不需要任何人"的骄傲，但也因此常常感到孤独。',
  strengths:[
    'IP打造能力极强：你天生知道怎么让人记住你，个人品牌是你的核武器',

    '学习速度快：独立作战练就了快速掌握新技能的本事，什么都能自己上手',
    '抗风险意识强：不把鸡蛋放在别人篮子里，对"被裁"有天然的免疫力'
  ],
  weaknesses:[
    '过于自我，不愿妥协：看不上"迎合市场"的事，容易跟商业机会擦肩而过',
    '单打独斗天花板低：一个人能做的事终究有限，不愿借力是最大的天花板',
    '容易忽视平台红利：看不起大厂的资源，嫌规则太多，但大厂确实有放大效应',
    '团队协作能力弱：觉得别人做得不如自己，什么事都想亲力亲为，最终累死自己'
  ],
  bestWay:'你的赚钱基因是"内容×影响力的幂次放大"。最适合的方式是打造一个以你为中心的内容品牌：选定一个垂直领域，持续输出高价值内容，建立你的个人IP护城河。然后通过知识付费、品牌合作、IP授权等方式把影响力变现。建议先从抖音/小红书/视频号中选一个主力平台深耕，做内容时不要太"端着"，学会用大众听得懂的语言表达你的专业。当你有了一定粉丝基础后，可以考虑做你自己的付费社群或线上课程——这些是边际成本极低但收益极高的产品形态。',
  avoidWay:[
    '❌ 传统打工做一辈子：你会被KPI和层级折磨到怀疑人生',
    '❌ 纯执行型岗位：老板让你做A你不能做B，这种工作会消耗你的创造力',
    '❌ 需要频繁妥协的乙方/代理：你的骄傲不会允许你长期做"跪着赚钱"的事',
    '❌ 没有话语权的小透明岗位：你会被忽视得浑身难受'
  ],
  actionPlan:[
    '第一步：选1个内容赛道，专注输出3个月，不追求完美，先追求量和频率',
    '第二步：建立你的产品体系——免费内容引流→低价产品筛选→高价服务变现',
    '第三步：找一个互补型合伙人来分担你不擅长的部分（运营、商务、执行）',
    '第四步：不要试图一个人做所有事，把"一个人是一支队伍"升级为"一个人是一支军队的统帅"'
  ],
  quote:'一个人就是一支队伍，但一支真正的队伍，能让你走得更远。'
},
{
  id:2, name:'大厂的牛马', color:'#4fc3f7',
  tagline:'稳定积累，安全感第一',
  personality:'踏实稳重是你的底色。你不喜欢冒险，也不羡慕那些"一夜暴富"的故事——你更相信时间的力量和复利的作用。对规则有天生的敬畏感，进了体系就能快速适应并存活下来。你的安全感建立在存款数字和稳定的工资流水之上，当银行卡余额减少时你会焦虑，当月底你收到工资到账短信时，你会觉得一切都井然有序。你对风险极其敏感，风险对你来说不是"可能赚更多"，而是"可能失去现有的一切"。',
  strengths:[
    '执行力极其靠谱：安排的事你一定会做完，质量稳定，极少翻车',
    '复利思维好：你天然懂"积少成多"的道理，理财、技能、人脉都在慢慢积累',
    '大厂生存能力一流：你懂得如何在复杂组织中保护自己、获取资源、稳步上升',

  weaknesses:[

    '投资过于保守：存款吃利息跑不过通胀，你在用"安全"的名义慢慢亏钱'
  ],
  bestWay:'你最适合的赚钱方式是"主业做压舱石 + 副业做增速器"的双轨模式。主业保住你的安全底线——不要裸辞，利用大厂的平台资源和信息差来武装自己。副业从你的专业技能延伸出来，哪怕一个月只多赚两三千，也是0到1的突破。在投资端，不要把全部钱存定期——学会做资产配置：50%稳健理财 + 30%指数基金定投 + 15%中风险资产 + 5%高风险探索。你不需要"搏"，你需要的是稍微打开一点点风险敞口，让钱开始替你工作。',
  avoidWay:[
    '❌ 裸辞去创业：你的安全感一旦被抽走会全面崩盘，创业还没开始心态就先垮了',
    '❌ 高杠杆投资或炒币：杠杆会放大你的焦虑，一次爆仓可能影响你整个财务规划',
    '❌ 完全依赖风口型项目：风口来得快去得也快，你没那个快速撤离的心理素质',
    '❌ 把全部积蓄投到一个"朋友说很稳"的项目里：对你来说，分散才是安全感'
  ],
  actionPlan:[
    '第一步：算清楚你的每月固定支出和"安全线"金额，把这笔钱单独存好不动',
    '第二步：从你的专业技能延伸出一个副业方向，先试3个月，不求赚钱只求验证',
    '第三步：学一项你完全不懂的投资知识（比如指数基金定投），用5%的资金练手',
    '第四步：每年至少做一件让你"有一点点不安但可控"的事——让自己习惯适度的不确定性'
  ],
  quote:'稳稳当当是基本功，但偶尔跳出舒适圈，才能看到更大的世界。安全感和成长，从来不是二选一。'
},
{
  id:3, name:'成长打工人', color:'#ffd54f',
  tagline:'打工是为了不再打工',
  personality:'你是一个永远在"进化"的人。对"停滞"有生理性的厌恶，如果连续三个月感觉不到成长，你会开始焦虑甚至抑郁。你的求知欲极强——买书、报课、加社群、约大佬吃饭，这些都是你的日常操作。你对"打工"有清醒的认知：打工不是归宿，而是跳板。你把自己当成一家"一个人的投资公司"，每一份工作都是一笔投资，要看ROI——学到了什么、接触了谁、提升了什么能力。你相信明天一定会比今天好，因为你在持续进化。但你的弱点也很明显：学得太多，做得太少。',
  strengths:[
    '成长速度惊人：同样两年，你的能力增值可能是同龄人的3倍',
    '认知变现能力强：你的见识和判断力本身就是钱——能看到别人看不到的机会',
    '人脉质量高：你善于结交比自己厉害的人，圈子就是你的隐藏资产',
    '跨界迁移能力好：A领域学到的思维能快速迁移到B领域，举一反三是你的本能'
  ],
  weaknesses:[
    '"学习成瘾"综合征：买了一堆课没看完，收藏夹里躺了几百篇文章，知识囤积但转化率极低',
    '浅尝辄止：每个领域都想了解，但很少有哪个领域真正扎下去做到了专家级别',

// ===== STATE =====
let mode='';
let questions=[];
let totalQ=0;
let currentQ=0;
let answers=[];
let scores=[0,0,0,0,0,0];

function showChoice(){
  document.getElementById('coverPage').style.display='none';
  document.getElementById('choicePage').classList.add('active');
}

function startTest(m){
  mode=m;
  questions=m==='light'?QL:QF;
  totalQ=questions.length;
  currentQ=0;
  answers=new Array(totalQ).fill(-1);
  scores=[0,0,0,0,0,0];
  document.getElementById('choicePage').classList.remove('active');
  document.getElementById('qPage').classList.add('active');
  document.getElementById('qMode').textContent=m==='light'?'轻交付版':'结果交付版';
  renderQ();
}

function renderQ(){
  var q=questions[currentQ];
  document.getElementById('qNum').textContent='Q'+(currentQ+1)+' / '+totalQ;
  document.getElementById('progressFill').style.width=(currentQ/totalQ*100)+'%';
  document.getElementById('qText').textContent=q.q;
  var h='';
  for(var i=0;i<q.o.length;i++){
    var o=q.o[i];
    var sel=answers[currentQ]===i?' selected':'';
    h+='<div class="opt-item'+sel+'" onclick="selectOpt('+i+')"><span class="opt-label">'+L[i]+'</span><span class="opt-text">'+o.s+'</span></div>';
  }
  document.getElementById('optList').innerHTML=h;
  document.getElementById('btnPrev').style.visibility=currentQ>0?'visible':'hidden';
  var last=currentQ===totalQ-1;
  document.getElementById('btnNext').textContent=last?'查看结果':'下一题';
}

function selectOpt(idx){
  answers[currentQ]=idx;
  var items=document.querySelectorAll('.opt-item');
  for(var i=0;i<items.length;i++) items[i].classList.toggle('selected',i===idx);
}

function nextQ(){
  if(answers[currentQ]===-1){alert('请先选择一个选项！');return;}
  if(currentQ<totalQ-1){currentQ++;renderQ();window.scrollTo({top:0,behavior:'instant'});}
  else showResult();
}

function prevQ(){
  if(currentQ>0){currentQ--;renderQ();window.scrollTo({top:0,behavior:'instant'});}
}

function calcScore(){
  scores=[0,0,0,0,0,0];
  for(var i=0;i<totalQ;i++){
    if(answers[i]>=0) scores[questions[i].o[answers[i]].t-1]++;
  }
  return scores;
}

function showResult(){
  calcScore();
  document.getElementById('qPage').classList.remove('active');
  document.getElementById('resultPage').classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});

  var ranked=scores.map(function(s,i){return {s:s,i:i,t:TYPES[i]};}).sort(function(a,b){return b.s-a.s;});
  var top=ranked[0];
  var pct=Math.round(top.s/totalQ*100);
  var sec=ranked[1];
  var t=top.t;
  var c=t.color;

  var h='';

  /* ===== Panel 1: 测试结果 ===== */
  h+='<div class="result-header">';
  h+='<div class="result-label">'+(mode==='light'?'轻交付版':'结果交付版')+' · 测试结果</div>';
  h+='<div class="result-type-name" style="color:'+c+'">'+t.name+'</div>';
  h+='<div class="result-type-tagline">'+t.tagline+'</div>';
  h+='</div>';

  h+='<div class="result-score-ring" style="border-color:'+c+'"><div class="score-num" style="color:'+c+'">'+pct+'</div><div class="score-pct">契合度</div></div>';

  /* ===== Panel 2: 核心性格特征 ===== */
  h+='<div class="result-panel highlight">';
  h+='<div class="panel-title"><span class="panel-number">2</span>核心性格特征</div>';
  h+='<div class="panel-content">'+t.personality+'</div>';
  h+='</div>';

  /* ===== Panel 3: 财富优势 ===== */
  h+='<div class="result-panel">';
  h+='<div class="panel-title"><span class="panel-number">3</span>财富优势</div>';
  h+='<ul class="panel-list good">';
  for(var i=0;i<t.strengths.length;i++){
    h+='<li>'+t.strengths[i]+'</li>';
  }
  h+='</ul></div>';

  /* ===== Panel 4: 结果短板 ===== */
  h+='<div class="result-panel">';
  h+='<div class="panel-title"><span class="panel-number">4</span>结果短板</div>';
  h+='<ul class="panel-list bad">';
  for(var i=0;i<t.weaknesses.length;i++){
    h+='<li>'+t.weaknesses[i]+'</li>';
  }
  h+='</ul></div>';

  /* ===== Panel 5: 最适合赚钱的方式 ===== */
  h+='<div class="result-panel highlight">';
  h+='<div class="panel-title"><span class="panel-number">5</span>最适合赚钱的方式</div>';
  h+='<div class="panel-content">'+t.bestWay+'</div>';
  h+='</div>';

  /* ===== Panel 6: 不建议选择的方向 ===== */
  h+='<div class="result-panel">';
  h+='<div class="panel-title"><span class="panel-number">6</span>不建议选择的方向</div>';
  h+='<ul class="panel-list bad">';
  for(var i=0;i<t.avoidWay.length;i++){
    h+='<li>'+t.avoidWay[i]+'</li>';
  }
  h+='</ul></div>';

  /* ===== Panel 7: 行动指南 ===== */
  h+='<div class="result-panel highlight">';
  h+='<div class="panel-title"><span class="panel-number">7</span>行动指南</div>';
  h+='<ul class="panel-list advice">';
  for(var i=0;i<t.actionPlan.length;i++){
    h+='<li>'+t.actionPlan[i]+'</li>';
  }
  h+='</ul></div>';

  /* ===== Panel 8: 送一句话 ===== */
  h+='<div class="result-panel highlight">';
  h+='<div class="panel-title"><span class="panel-number">8</span>送他一句话</div>';
  h+='</div>';
  h+='<div class="quote-box">';
  h+='<div class="quote-icon">💎</div>';
  h+='<div class="quote-text" style="color:'+c+'">'+t.quote+'</div>';
  h+='</div>';

  /* ===== 六维分布 (small) ===== */
  h+='<div class="result-panel">';
  h+='<div class="panel-title"><span class="panel-number" style="background:rgba(255,255,255,.08);color:#aaa">+</span>六维分布图</div>';
  h+='<div class="dims-grid">';
  for(var i=0;i<6;i++){
    var bp=Math.round(scores[i]/totalQ*100);
    h+='<div class="dim-item"><span class="dim-label">'+TYPES[i].name+'</span><div class="dim-bar"><div class="dim-fill" style="width:'+bp+'%;background:'+TYPES[i].color+'"></div></div><span class="dim-pct" style="color:'+TYPES[i].color+'">'+bp+'%</span></div>';
  }
  h+='</div></div>';

  document.getElementById('resultContent').innerHTML=h;
}

function goHome(){
  document.getElementById('resultPage').classList.remove('active');
  document.getElementById('choicePage').classList.add('active');
}
</script>
